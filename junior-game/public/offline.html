<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#8bd6d0" />
    <title>다시 눌러볼까?</title>
    <style>
      body {
        min-height: 100dvh;
        display: grid;
        place-items: center;
        margin: 0;
        padding: 24px;
        background: linear-gradient(180deg, #8bd6d0, #dff5cf 64%, #8dcb72);
        color: #20351f;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      section {
        width: min(340px, 92vw);
        display: grid;
        gap: 12px;
        justify-items: center;
        padding: 26px 22px;
        border-radius: 28px;
        background: rgba(255, 251, 229, 0.96);
        box-shadow: 0 14px 28px rgba(42, 91, 68, 0.16);
        text-align: center;
      }

      img {
        width: 96px;
        height: 96px;
        object-fit: contain;
      }

      h1 {
        margin: 0;
        font-size: 1.35rem;
      }

      p {
        margin: 0;
        font-size: 1rem;
        font-weight: 800;
        line-height: 1.35;
      }

      button {
        min-height: 56px;
        padding: 0 24px;
        border: 0;
        border-radius: 18px;
        background: linear-gradient(180deg, #ffe777, #f3a342);
        color: #3c2810;
        font: inherit;
        font-size: 1.08rem;
        font-weight: 1000;
        box-shadow: inset 0 -6px 0 rgba(52, 44, 22, 0.14);
      }
    </style>
  </head>
  <body>
    <section>
      <img src="./assets/fairy/fairy-default.png" alt="바람이" />
      <h1>길이 잠깐 끊겼어.</h1>
      <p>인터넷이 돌아오면 다시 이어서 할 수 있어.</p>
      <button onclick="location.reload()">다시 눌러볼까?</button>
    </section>
  </body>
</html>
