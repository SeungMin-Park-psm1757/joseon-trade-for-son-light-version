name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  starter:
    name: Starter app checks
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: starter

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: starter/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Validate data
        run: npm run validate:data

      - name: Audit consistency
        run: npm run audit:consistency

      - name: Build
        run: npm run build

      - name: Smoke test
        run: npm run test:smoke

      - name: Visual smoke
        run: npm run test:visual

      - name: Upload visual screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-current
          path: .logs/visual-regression-current
